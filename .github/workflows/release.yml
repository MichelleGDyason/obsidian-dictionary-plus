name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and build
        run: |
          npm run check
          npm test
          npm run build

      - name: Package plugin
        run: |
          mkdir obsidian-dictionary-plus
          cp main.js manifest.json styles.css README.md obsidian-dictionary-plus/
          zip -qr obsidian-dictionary-plus.zip obsidian-dictionary-plus

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            obsidian-dictionary-plus.zip \
            main.js \
            manifest.json \
            styles.css \
            dictionary.json \
            --verify-tag \
            --title "Dictionary Plus $GITHUB_REF_NAME" \
            --generate-notes
